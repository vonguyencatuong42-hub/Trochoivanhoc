<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trò Chơi Văn Học</title>

<style>
body{
    margin:0;
    font-family:"Times New Roman", serif;
    /* Đặt tên file ảnh nền là hinhnen.jpg */
    background: url('hinhnen.jpg') no-repeat center center fixed;
    background-size: cover;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
    overflow:auto;
    position: relative;
}

/* Overlay giống như khúc đầu - màu tối để chữ dễ đọc */
body::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.6);
    z-index: 0;
}

.container{
    width:900px;
    text-align:center;
    position: relative;
    z-index: 1;
}

.hidden{display:none;}

h1,h2{margin:10px;}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    padding: 15px 20px;
    border-radius: 15px;
    margin-bottom: 20px;
    border: 1px solid rgba(255,255,255,0.3);
}

#question {
    margin: 0;
    flex: 1;
    text-align: left;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

#questionCounter {
    font-size: 20px;
    font-weight: bold;
    background: white;
    color: black;
    padding: 8px 15px;
    border-radius: 30px;
    border: 3px solid black;
    backdrop-filter: blur(5px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    font-family: 'Arial Black', sans-serif;
}

#timer{
    font-size:24px;
    margin-top:10px;
    transition:0.3s;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}

.redBlink{
    color:red;
    animation:blink 0.5s infinite;
}

@keyframes blink{
    0%{opacity:1;}
    50%{opacity:0.3;}
    100%{opacity:1;}
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    50% { transform: translateX(10px); }
    75% { transform: translateX(-5px); }
    100% { transform: translateX(0); }
}

.shake {
    animation: shake 0.5s ease-in-out;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-top:20px;
}

button{
    border:none;
    padding:20px;
    font-size:18px;
    color:white;
    cursor:pointer;
    border-radius:12px;
    transition: all 0.3s ease;
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.2);
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
}

/* Thêm hiệu ứng khi hover vào button */
button:hover {
    transform: scale(1.05);
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    background: rgba(255,255,255,0.2);
    border: 1px solid white;
}

/* Thêm hiệu ứng khi active (nhấn vào) */
button:active {
    transform: scale(0.95);
}

.red{background:rgba(255, 59, 111, 0.8);}
.blue{background:rgba(58, 134, 255, 0.8);}
.yellow{background:rgba(255, 183, 3, 0.8);}
.green{background:rgba(45, 106, 79, 0.8);}

#zoomBox{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:38px;
    font-weight:bold;
    text-align:center;
    padding:30px;
    z-index:999;
    animation:zoomIn 0.3s ease;
    backdrop-filter: blur(10px);
}

@keyframes zoomIn{
    from{transform:scale(0.3);opacity:0;}
    to{transform:scale(1);opacity:1;}
}

#streak{
    font-size:22px;
    margin-top:5px;
    background: rgba(255,215,0,0.2);
    padding: 5px 15px;
    border-radius: 30px;
    display: inline-block;
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255,215,0,0.5);
}

#summaryBox{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    /* Dùng ảnh nền hinhnen.jpg giống khúc đầu - KHÔNG có overlay */
    background: url('hinhnen.jpg') no-repeat center center fixed;
    background-size: cover;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    overflow-y:auto;
    padding:40px 20px;
    box-sizing:border-box;
    color:white;
    z-index:1000;
}

/* ĐÃ XÓA overlay toàn màn hình */

#summaryContent{
    max-width:800px;
    width:100%;
    background: rgba(0, 0, 0, 0.7); /* Màu đen mờ cho ô đáp án */
    backdrop-filter: blur(5px);
    padding:30px;
    border-radius:20px;
    font-size:18px;
    margin:20px auto;
    border: 2px solid rgba(255,255,255,0.2);
    position: relative;
    z-index: 1;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* Style cho phần tổng kết */
.summary-correct {
    color: #4CAF50 !important;
    font-weight: bold;
}

.summary-wrong {
    color: #ff4d6d !important;
    font-weight: bold;
}

.summary-correct-answer {
    color: #FFC107 !important;
    font-weight: bold;
}

/* Style cho nút chơi lại */
.replay-button {
    padding:15px 40px;
    font-size:18px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    background:#ffd700;
    color:black;
    font-weight:bold;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.replay-button:hover {
    transform: scale(1.05);
    background: #ffed4a;
}

.replay-button:active {
    transform: scale(0.95);
}
</style>
</head>

<body>

<div class="container">

<div id="intro">
    <h1>📚 Trò Chơi Văn Học 📚</h1>
    <p>Bạn đã sẵn sàng chưa?</p>
    <button class="green" onclick="startGame()" style="background: #52b788;" id="startButton">Sẵn sàng</button>
</div>

<div id="game" class="hidden">
    <div class="header">
        <h2 id="question"></h2>
        <div id="questionCounter"></div>
    </div>
    <div id="streak">🔥 0</div>
    <div id="timer"></div>
    <div class="grid" id="answers"></div>
</div>

</div>

<!-- ÂM THANH -->
<audio src="Nom - Childhood Dreams.mp3" autoplay loop ></audio>

<audio id="correctSound" preload="auto" src="votay.mp3"></audio>
<audio id="wrongSound" preload="auto" src="tete.mp3"></audio>
<audio id="clickSound" preload="auto" src="click.mp3"></audio>
<audio id="summarySound" preload="auto" src="summary.mp3"></audio>

<script>
// ===== HÌNH NỀN =====
document.body.style.backgroundImage = "url('hinhnen.jpg')";

// ===== NHẠC NỀN =====
const bgMusic = document.getElementById("bgmusic");
bgMusic.volume = 0.25;

function playBackgroundMusic() {
    bgMusic.play().catch(e => console.log("Nhạc chưa play được:", e));
}

// ===== ÂM THANH CLICK =====
function playClickSound() {
    const clickSound = document.getElementById("clickSound");
    if (clickSound) {
        clickSound.currentTime = 0;
        clickSound.play().catch(e => console.log("Không thể play click.mp3"));
    }
}

// GẮN VỚI startGame
function startGame(){
    playClickSound();      // click sound
    playBackgroundMusic(); // bật nhạc nền

    document.getElementById("intro").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    showQuestion();
}
    
const questions = [
{question:"Ai là tác giả của 'Lão Hạc'?",
answers:["Nam Cao","Tô Hoài","Kim Lân","Nguyễn Du"],
correct:0},

{question:"Tác phẩm 'Vợ nhặt' của ai?",
answers:["Kim Lân","Nam Cao","Tô Hoài","Ngô Tất Tố"],
correct:0},

{question:"Thúy Kiều thuộc tác phẩm nào?",
answers:["Tắt đèn","Truyện Kiều","Làng","Vợ nhặt"],
correct:1},

{question:"'Chiếc lược ngà' nói về tình cảm gì?",
answers:["Tình bạn","Tình cha con","Tình yêu","Tình thầy trò"],
correct:1},

{question:"Tác giả bài 'Đồng chí'?",
answers:["Xuân Diệu","Hữu Thỉnh","Tố Hữu","Chính Hữu"],
correct:3},

{question:"'Ông lão đánh cá và con cá vàng' là truyện của nước nào?",
answers:["Ý","Anh","Nga","Đức"],
correct:2},

{question:"Bài thơ 'Sang thu' của ai?",
answers:["Hữu Thỉnh","Tố Hữu","Xuân Diệu","Chính Hữu"],
correct:0},

{question:"Nhân vật chị Dậu thuộc tác phẩm nào?",
answers:["Lão Hạc","Làng","Vợ nhặt","Tắt đèn"],
correct:3},

{question:"Tác giả 'Truyện Kiều' là ai?",
answers:["Nguyễn Du","Hồ Xuân Hương","Xuân Diệu","Nguyễn Đình Chiểu"],
correct:0},

{question:"Giá trị hiện thực của văn học là gì?",
answers:["Tạo ra thế giới tưởng tượng",
         "Chỉ nói về tình yêu",
         "Phản ánh đời sống xã hội",
         "Chỉ miêu tả thiên nhiên"],
correct:2}
];

let current=0;
let score=0;
let streak=0;
let timer;
let timeLeft=10;
let locked=false;
let maxStreak = 0;
let userAnswers = [];

function startGame(){
    playClickSound(); // Phát âm thanh click khi bấm nút sẵn sàng
    
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    showQuestion();
}

function showQuestion(){
locked=false;
let q=questions[current];

document.getElementById("question").innerText=q.question;
document.getElementById("questionCounter").innerText = `Câu ${current+1}/${questions.length}`;

document.getElementById("answers").innerHTML="";
document.getElementById("streak").innerText="🔥 "+streak;

let colors=["red","blue","yellow","green"];

q.answers.forEach((ans,index)=>{
let btn=document.createElement("button");
btn.classList.add(colors[index]);
btn.innerText=ans;

// Thêm sound click khi bấm vào lựa chọn
btn.addEventListener('click', function() {
    playClickSound(); // Phát âm thanh click
    checkAnswer(index);
});

btn.addEventListener('touchstart', function() {
    playClickSound(); // Phát âm thanh click trên mobile
    checkAnswer(index);
});

document.getElementById("answers").appendChild(btn);
});

startTimer();
}

function startTimer(){
    if(timer){
        clearInterval(timer);
    }

    const timerDisplay = document.getElementById("timer");
    timerDisplay.classList.remove("redBlink");

    let timeLeft = 10;
    timerDisplay.innerText = "⏱ " + timeLeft + " giây";

    timer = setInterval(()=>{
        timeLeft--;

        if(timeLeft >= 0){
            timerDisplay.innerText = "⏱ " + timeLeft + " giây";
        }

        if(timeLeft <= 3 && timeLeft > 0){
            timerDisplay.classList.add("redBlink");
        }

        if(timeLeft <= 0){
            clearInterval(timer);
            checkAnswer(-1);
        }
    },1000);
}

function checkAnswer(index){
    if(locked) return;
    locked = true;

    if(timer){
        clearInterval(timer);
    }
    
    userAnswers[current] = index;

    let correctIndex = questions[current].correct;
    let correctText = questions[current].answers[correctIndex];

    let message = "";
    let bgColor = "";

    if(index === -1){
        message = "⌛ Hết giờ! Đáp án là: " + correctText;
        bgColor = "rgba(255, 193, 7, 0.95)";
        streak = 0;
        
        // Phát âm thanh tete.mp3 khi hết giờ
        document.getElementById("wrongSound").play();
    }
    else if(index === correctIndex){
        score++;
        streak++;

        if(streak > maxStreak){
            maxStreak = streak;
        }

        message = "✅ Chính xác!";
        bgColor = "rgba(82, 183, 136, 0.95)";
        document.getElementById("correctSound").play();
    }
    else{
        message = "❌ Sai rồi! Đáp án đúng là: " + correctText;
        bgColor = "rgba(255, 77, 109, 0.95)";
        streak = 0;
        document.getElementById("wrongSound").play();
        
        document.querySelector('.container').classList.add('shake');
        setTimeout(() => {
            document.querySelector('.container').classList.remove('shake');
        }, 500);
    }

    document.getElementById("streak").innerText = "🔥 " + streak;

    let zoom = document.createElement("div");
    zoom.id = "zoomBox";
    zoom.style.background = bgColor;
    zoom.innerHTML = message;
    document.body.appendChild(zoom);

    current++;

    setTimeout(()=>{
        document.body.removeChild(zoom);

        if(current < questions.length){
            showQuestion();
        }else{
            showSummary();
        }
    },3000);
}

function showSummary(){
    document.getElementById("game").classList.add("hidden");

    // Phát âm thanh khi phần tổng kết xuất hiện
    const summarySound = document.getElementById("summarySound");
    if (summarySound) {
        summarySound.currentTime = 0;
        summarySound.play().catch(e => console.log("Không thể phát âm thanh summary.mp3"));
    }

    let rating = "";
    if(score >= 9) rating = "🌟 Xuất sắc!";
    else if(score >= 7) rating = "👏 Rất tốt!";
    else if(score >= 5) rating = "👍 Khá!";
    else rating = "💪 Cần cố gắng!";

    let summaryBox = document.createElement("div");
    summaryBox.id = "summaryBox";
    summaryBox.style.overflowY = "auto";
    summaryBox.style.display = "flex";
    summaryBox.style.justifyContent = "center";
    summaryBox.style.alignItems = "flex-start";
    summaryBox.style.padding = "40px 20px";
    summaryBox.style.position = "fixed";
    summaryBox.style.top = "0";
    summaryBox.style.left = "0";
    summaryBox.style.width = "100%";
    summaryBox.style.height = "100%";
    
    // Set ảnh nền cho summaryBox
    summaryBox.style.backgroundImage = "url('hinhnen.jpg')";
    summaryBox.style.backgroundSize = "cover";
    summaryBox.style.backgroundPosition = "center";
    summaryBox.style.backgroundRepeat = "no-repeat";
    summaryBox.style.backgroundAttachment = "fixed";

    let answerList = "";

    questions.forEach((q, index)=>{
        let correctIndex = q.correct;
        let userIndex = userAnswers[index];

        let correctText = q.answers[correctIndex];
        let userText = (userIndex !== undefined && userIndex >= 0) ? q.answers[userIndex] : "Không trả lời";

        let userClass = (userIndex === correctIndex) ? "summary-correct" : "summary-wrong";

        answerList += `
            <div style="margin:15px 0;text-align:left;">
                <b>Câu ${index+1}:</b> ${q.question}<br>
                <span class="${userClass}">
                    Bạn chọn: ${userText}
                </span><br>
                <span class="summary-correct-answer">
                    Đáp án đúng: ${correctText}
                </span>
            </div>
            <hr style="border-color:rgba(255,255,255,0.2);">
        `;
    });

    summaryBox.innerHTML = `
<div id="summaryContent">
    <h1 style="font-size:32px;">🎉 TỔNG KẾT 🎉</h1>
    <h2>Điểm: ${score}/${questions.length}</h2>
    <h3>${rating}</h3>
    <h3>🔥 Streak cao nhất: ${maxStreak}</h3>
    <hr style="border-color:rgba(255,255,255,0.2);">
    ${answerList}
    <div style="text-align:center;margin-top:30px;">
        <button class="replay-button" onclick="replayGame()">
            🔄 Chơi lại
        </button>
    </div>
</div>
`;

    document.body.appendChild(summaryBox);
}

// Hàm chơi lại với âm thanh click
function replayGame() {
    playClickSound(); // Phát âm thanh click khi bấm nút chơi lại
    
    // Reload trang sau một chút để âm thanh được phát
    setTimeout(() => {
        location.reload();
    }, 100);
}
</script>

</body>

</html>
