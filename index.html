<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trò Chơi Văn Học</title>
<style>
/* Giữ nguyên CSS của bạn */
</style>
</head>
<body>
<div class="container">
<div id="intro">
    <h1>📚 Trò Chơi Văn Học 📚</h1>
    <p>Bạn đã sẵn sàng chưa?</p>
    <button class="green" onclick="startGame()" style="background: #52b788;" id="startButton">Sẵn sàng</button>
</div>
<div id="game" class="hidden">
    <div class="header">
        <h2 id="question"></h2>
        <div id="questionCounter"></div>
    </div>
    <div id="streak">🔥 0</div>
    <div id="timer"></div>
    <div class="grid" id="answers"></div>
</div>
</div>

<!-- ÂM THANH -->
<audio id="bgmusic" loop preload="auto">
    <source src="Nom%20-%20Childhood%20Dreams.mp3" type="audio/mpeg">
    <!-- Hoặc dùng: <source src="Nom-Childhood-Dreams.mp3" type="audio/mpeg"> -->
</audio>
<audio id="correctSound" preload="auto" src="votay.mp3"></audio>
<audio id="wrongSound" preload="auto" src="tete.mp3"></audio>
<audio id="clickSound" preload="auto" src="click.mp3"></audio>
<audio id="summarySound" preload="auto" src="summary.mp3"></audio>

<script>
const bgMusic = document.getElementById("bgmusic");
if(bgMusic) bgMusic.volume = 0.25;

function playBackgroundMusic() {
    if(bgMusic) {
        bgMusic.play().catch(e => console.log("Không thể phát nhạc nền tự động:", e));
    }
}

function playClickSound() {
    const clickSound = document.getElementById("clickSound");
    if (clickSound) {
        clickSound.currentTime = 0;
        clickSound.play().catch(e => {});
    }
}

function startGame(){
    playClickSound();
    playBackgroundMusic();
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    showQuestion();
}
    
const questions = [
{question:"Đoạn trích 'Kiều báo ân báo oán' nằm ở phần nào của truyện Kiều?",
answers:["Đoàn tụ","Đấu tranh","Gia biến và lưu lạc","Gặp gỡ và Đính ước"],
correct:2},
{question:"Nhân vật Thúy Kiều thuộc tác phẩm nào?",
answers:["Tắt đèn","Truyện Kiều","Làng","Vợ nhặt"],
correct:1},
{question:"'Chiếc lược ngà' nói về tình cảm gì?",
answers:["Tình bạn","Tình cha con","Tình yêu","Tình thầy trò"],
correct:1},
{question:"Văn bản 'Kiều báo ân báo oán' được trích từ tác phẩm nào?",
answers:["Truyện Kiều","Kim Vân Kiều Truyện","Lục Vân Tiên","Truyện Người Con gái Nam Xương"],
correct:0},
{question:"Nội dung chính của bài thơ 'Bếp lửa' là gì?",
answers:["Nói về tình cảm nhớ thương của người con dành cho cha mẹ đang chiến đấu ở xa","Nói về tình cảm yêu thương của người bà dành cho con và cháu","Miêu tả vẻ đẹp của hình ảnh bếp lửa mỗi buổi sớm mai","Nói về tình cảm sâu nặng, thiêng liêng của người cháu đối với người bà"],
correct:3},
{question:"'Ông lão đánh cá và con cá vàng' là truyện của nước nào?",
answers:["Ý","Anh","Nga","Đức"],
correct:2},
{question:"Theo Holmes, việc đoán trong quá trình suy luận là gì?",
answers:["Một thói quen cực kỳ tai hại","Một phương pháp hiệu quả","Một thói quen tốt","Một kỹ năng cần thiết"],
correct:0},
{question:"Nhân vật chị Dậu thuộc tác phẩm nào?",
answers:["Lão Hạc","Làng","Vợ nhặt","Tắt đèn"],
correct:3},
{question:"Bước thứ ba trong phương pháp của Hôm là gì?",
answers:["Quan sát kỹ lưỡng","Loại trừ nguyên nhân ít khả năng xảy ra nhất","Kết luận","Đưa ra giả thiết về nguyên nhân dẫn tới các chi tiết quan sát được"],
correct:1},
{question:"Giá trị hiện thực của văn học là gì?",
answers:["Tạo ra thế giới tưởng tượng","Cho ta thấy giá trị của tình yêu","Phản ánh đời sống xã hội","Miêu tả thế giới xung quanh"],
correct:2}
];

let current=0;
let score=0;
let streak=0;
let timer;
let locked=false;
let maxStreak = 0;
let userAnswers = [];

function showQuestion(){
    locked=false;
    let q=questions[current];

    document.getElementById("question").innerText=q.question;
    document.getElementById("questionCounter").innerText = `Câu ${current+1}/${questions.length}`;
    document.getElementById("answers").innerHTML="";
    document.getElementById("streak").innerText="🔥 "+streak;

    let colors=["red","blue","yellow","green"];

    q.answers.forEach((ans,index)=>{
        let btn=document.createElement("button");
        btn.classList.add(colors[index]);
        btn.innerText=ans;
        btn.onclick = function() {
            playClickSound();
            checkAnswer(index);
        };
        document.getElementById("answers").appendChild(btn);
    });

    startTimer();
}

function startTimer(){
    if(timer) clearInterval(timer);
    const timerDisplay = document.getElementById("timer");
    timerDisplay.classList.remove("redBlink");
    let timeLeft = 10;
    timerDisplay.innerText = "⏱ " + timeLeft + " giây";
    timer = setInterval(()=>{
        timeLeft--;
        if(timeLeft >= 0) timerDisplay.innerText = "⏱ " + timeLeft + " giây";
        if(timeLeft <= 3 && timeLeft > 0) timerDisplay.classList.add("redBlink");
        if(timeLeft <= 0){
            clearInterval(timer);
            checkAnswer(-1);
        }
    },1000);
}

function checkAnswer(index){
    if(locked) return;
    locked = true;
    if(timer) clearInterval(timer);
    
    userAnswers[current] = index;
    let correctIndex = questions[current].correct;
    let correctText = questions[current].answers[correctIndex];
    let message = "";
    let bgColor = "";

    if(index === -1){
        message = "⌛ Hết giờ! Đáp án là: " + correctText;
        bgColor = "rgba(255, 193, 7, 0.95)";
        streak = 0;
        document.getElementById("wrongSound").play().catch(e=>{});
    }
    else if(index === correctIndex){
        score++;
        streak++;
        if(streak > maxStreak) maxStreak = streak;
        message = "✅ Chính xác!";
        bgColor = "rgba(82, 183, 136, 0.95)";
        document.getElementById("correctSound").play().catch(e=>{});
    }
    else{
        message = "❌ Sai rồi! Đáp án đúng là: " + correctText;
        bgColor = "rgba(255, 77, 109, 0.95)";
        streak = 0;
        document.getElementById("wrongSound").play().catch(e=>{});
        document.querySelector('.container').classList.add('shake');
        setTimeout(() => document.querySelector('.container').classList.remove('shake'), 500);
    }

    document.getElementById("streak").innerText = "🔥 " + streak;
    let zoom = document.createElement("div");
    zoom.id = "zoomBox";
    zoom.style.background = bgColor;
    zoom.innerHTML = message;
    document.body.appendChild(zoom);
    current++;
    setTimeout(()=>{
        document.body.removeChild(zoom);
        if(current < questions.length) showQuestion();
        else showSummary();
    },3000);
}

function showSummary(){
    document.getElementById("game").classList.add("hidden");
    document.getElementById("summarySound").play().catch(e=>{});

    let rating = score >= 9 ? "🌟 Xuất sắc!" : score >= 7 ? "👏 Rất tốt!" : score >= 5 ? "👍 Khá!" : "💪 Cần cố gắng!";
    let summaryBox = document.createElement("div");
    summaryBox.id = "summaryBox";
    summaryBox.style.cssText = "position:fixed; top:0; left:0; width:100%; height:100%; background:url('hinhnen.jpg') center/cover fixed; overflow-y:auto; padding:40px 20px; box-sizing:border-box; z-index:1000;";
    
    let answerList = "";
    questions.forEach((q, index)=>{
        let correctIndex = q.correct;
        let userIndex = userAnswers[index];
        let correctText = q.answers[correctIndex];
        let userText = (userIndex !== undefined && userIndex >= 0) ? q.answers[userIndex] : "Không trả lời";
        let userClass = (userIndex === correctIndex) ? "summary-correct" : "summary-wrong";
        answerList += `
            <div style="margin:15px 0;text-align:left;">
                <b>Câu ${index+1}:</b> ${q.question}<br>
                <span class="${userClass}">Bạn chọn: ${userText}</span><br>
                <span class="summary-correct-answer">Đáp án đúng: ${correctText}</span>
            </div>
            <hr style="border-color:rgba(255,255,255,0.2);">
        `;
    });

    summaryBox.innerHTML = `
<div id="summaryContent" style="max-width:800px; margin:20px auto; background:rgba(0,0,0,0.7); backdrop-filter:blur(5px); padding:30px; border-radius:20px;">
    <h1 style="font-size:32px;">🎉 TỔNG KẾT 🎉</h1>
    <h2>Điểm: ${score}/${questions.length}</h2>
    <h3>${rating}</h3>
    <h3>🔥 Streak cao nhất: ${maxStreak}</h3>
    <hr>
    ${answerList}
    <div style="text-align:center;margin-top:30px;">
        <button class="replay-button" onclick="replayGame()" style="padding:15px 40px; background:#ffd700; border:none; border-radius:15px; cursor:pointer; font-weight:bold;">🔄 Chơi lại</button>
    </div>
</div>
`;
    document.body.appendChild(summaryBox);
}

function replayGame() {
    playClickSound();
    setTimeout(() => location.reload(), 100);
}
</script>
</body>
</html>
